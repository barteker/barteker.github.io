    <script>
        const lenis = new Lenis({
            autoRaf: true,
        });

        document.querySelectorAll('.video-preview-item').forEach(item => {
            const video = item.querySelector('.hover-preview');
            item.addEventListener('mouseenter', () => {
                video.play();
            });
            item.addEventListener('mouseleave', () => {
                video.pause();
                video.currentTime = 0;
            });
        });
